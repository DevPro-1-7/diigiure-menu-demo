<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Diigiure — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="../firebase-config.js"></script>
<link rel="stylesheet" href="../css/main.css"/>
<style>
body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); }
.login-box {
  width: 100%; max-width: 360px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 32px 24px;
  box-shadow: var(--shadow-l);
  animation: fu .4s ease;
}
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo-mark { width: 56px; height: 56px; border-radius: 18px; background: var(--acc); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #fff; margin: 0 auto 10px; }
.logo-wrap h1 { font-size: 20px; font-weight: 900; letter-spacing: -.02em; }
.logo-wrap p  { font-size: 12px; color: var(--ink3); margin-top: 3px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--ink3); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
.inp-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 0 12px; height: 44px;
  transition: border-color .15s;
}
.inp-wrap:focus-within { border-color: var(--acc); }
.inp-wrap svg { width: 16px; height: 16px; color: var(--ink4); flex-shrink: 0; }
.inp-wrap input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 14px; color: var(--ink); font-family: var(--font);
}
.inp-wrap input::placeholder { color: var(--ink4); }
.show-pass { color: var(--ink4); padding: 4px; }
.show-pass svg { width: 15px; height: 15px; }
.err-msg { font-size: 12px; color: var(--red); background: var(--red-s); padding: 9px 12px; border-radius: 9px; margin-bottom: 14px; display: none; }
.err-msg.show { display: block; animation: fu .2s ease; }
.btn-login {
  width: 100%; height: 48px; border-radius: 14px;
  background: var(--acc); color: #fff;
  font-size: 15px; font-weight: 800; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; border: none;
  transition: opacity .15s, transform .1s;
  margin-top: 4px;
}
.btn-login:active   { transform: scale(.97); opacity: .9; }
.btn-login:disabled { opacity: .6; cursor: not-allowed; }
.btn-login .spinner { width: 18px; height: 18px; border-color: rgba(255,255,255,.3); border-top-color: #fff; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo-wrap">
    <div class="logo-mark" id="logo-mark">D</div>
    <h1>Diigiure</h1>
    <p>لوحة إدارة القائمة الرقمية</p>
  </div>

  <div class="field">
    <label>البريد الإلكتروني</label>
    <div class="inp-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" dir="ltr"/>
    </div>
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <div class="inp-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" dir="ltr"/>
      <button class="show-pass" id="show-pass" type="button">
        <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div class="err-msg" id="err-msg"></div>

  <button class="btn-login" id="btn-login" type="button">
    <span id="btn-txt">دخول</span>
  </button>
</div>

<div id="toast"></div>

<script type="module">
import { Auth } from '../js/db.js';

// ── Redirect if already logged in ────────
Auth.onChange(user => {
  if (user) window.location.href = './index.html';
});

// ── Show/hide password ───────────────────
const passInp = document.getElementById('password');
document.getElementById('show-pass').addEventListener('click', () => {
  const show = passInp.type === 'password';
  passInp.type = show ? 'text' : 'password';
  document.getElementById('eye-off').style.display = show ? 'none'  : 'block';
  document.getElementById('eye-on').style.display  = show ? 'block' : 'none';
});

// ── Login ────────────────────────────────
const btn    = document.getElementById('btn-login');
const errMsg = document.getElementById('err-msg');

function setLoading(on) {
  btn.disabled = on;
  document.getElementById('btn-txt').textContent = on ? '' : 'دخول';
  btn.innerHTML = on
    ? '<div class="spinner"></div>'
    : '<span id="btn-txt">دخول</span>';
}

function showErr(msg) {
  errMsg.textContent = msg;
  errMsg.classList.add('show');
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  errMsg.classList.remove('show');

  if (!email) { showErr('يرجى إدخال البريد الإلكتروني'); return; }
  if (!pass)  { showErr('يرجى إدخال كلمة المرور'); return; }

  setLoading(true);
  try {
    await Auth.login(email, pass);
    window.location.href = './index.html';
  } catch(e) {
    const msgs = {
      'auth/user-not-found':    'البريد الإلكتروني غير مسجل',
      'auth/wrong-password':    'كلمة المرور غير صحيحة',
      'auth/invalid-email':     'البريد الإلكتروني غير صالح',
      'auth/too-many-requests': 'محاولات كثيرة. حاول لاحقاً',
      'auth/invalid-credential':'البريد أو كلمة المرور غير صحيحة',
    };
    showErr(msgs[e.code] || 'حدث خطأ. تحقق من البيانات.');
    setLoading(false);
  }
}

btn.addEventListener('click', login);
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
