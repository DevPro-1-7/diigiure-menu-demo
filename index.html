<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#FAFAF8" id="meta-theme"/>
<title id="doc-title">القائمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<!-- data.js: مصدر البيانات الوحيد — يُحدَّث من لوحة الإدارة -->
<script src="data.js"></script>
<style>
:root{
  --bg:#FAFAF8;--bg2:#F3F2ED;--bg3:#E9E8E1;
  --ink:#111;--ink2:#444;--ink3:#888;--ink4:#BBB;
  --card:#FFF;--border:#EBEBEB;
  --acc:#FF5C35;--acc-s:#FF5C3515;
  --green:#16A34A;--green-s:#16A34A15;
  --red:#DC2626;--red-s:#DC262615;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.06);
  --shadow-l:0 8px 32px rgba(0,0,0,.12);
  --r:14px;--r-l:20px;
  --font:'Cairo',system-ui,sans-serif;
}
[data-theme=dark]{
  --bg:#0E0E0E;--bg2:#181818;--bg3:#242424;
  --ink:#F0EFE9;--ink2:#BBB;--ink3:#777;--ink4:#444;
  --card:#1C1C1C;--border:#2A2A2A;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.25);
  --shadow-l:0 8px 32px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
img{display:block}a{text-decoration:none;color:inherit}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{display:none}

/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Promo */
#promo{overflow:hidden;white-space:nowrap;font-size:12px;font-weight:700;padding:9px 0;color:#fff;background:var(--acc)}
#promo .track{display:inline-block;animation:ticker 22s linear infinite}
#promo .track span{padding:0 60px}

/* Topbar */
#topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:8px;padding:0 14px;height:54px;background:rgba(250,250,248,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:background .2s}
[data-theme=dark] #topbar{background:rgba(14,14,14,.88)}
#tb-logo{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;background:var(--acc);flex-shrink:0;overflow:hidden}
#tb-logo img{width:100%;height:100%;object-fit:cover;border-radius:10px}
#tb-name{flex:1;font-size:15px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-btn{width:36px;height:36px;border-radius:10px;background:var(--bg2);color:var(--ink2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s,transform .1s}
.tb-btn:active{transform:scale(.92)}.tb-btn svg{width:17px;height:17px}
.tb-btn.on{background:var(--acc);color:#fff}

/* Search */
#search-wrap{padding:0 14px 11px;background:rgba(250,250,248,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:54px;z-index:99;display:none}
[data-theme=dark] #search-wrap{background:rgba(14,14,14,.88)}
#search-wrap.show{display:block;animation:fu .2s ease}
#search-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:0 12px;height:40px;transition:border-color .15s}
#search-row:focus-within{border-color:var(--acc)}
#search-row svg{width:16px;height:16px;color:var(--ink4);flex-shrink:0}
#search-inp{flex:1;background:none;border:none;outline:none;font-size:14px;font-weight:500;color:var(--ink);font-family:var(--font)}
#search-inp::placeholder{color:var(--ink4)}
#search-x{color:var(--ink4);padding:4px;display:none}
#search-x svg{width:14px;height:14px}

/* Category bar */
#cats{position:sticky;z-index:98;display:flex;gap:7px;padding:9px 14px;overflow-x:auto;background:rgba(250,250,248,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
[data-theme=dark] #cats{background:rgba(14,14,14,.88)}
.cat-pill{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:0 14px;height:34px;border-radius:9px;font-size:13px;font-weight:700;background:var(--bg2);color:var(--ink3);transition:background .15s,color .15s,transform .1s;white-space:nowrap}
.cat-pill:active{transform:scale(.94)}
.cat-pill.on{background:var(--ink);color:var(--bg)}
.cat-pill.acc{background:var(--acc)!important;color:#fff!important}

/* Hero */
#hero{margin:12px 14px 4px;border-radius:var(--r-l);overflow:hidden;position:relative;aspect-ratio:16/7}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
#hero-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%)}
#hero-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:16px 18px}
#hero-eyebrow{font-size:9px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
#hero-title{font-size:21px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-.02em}
#hero-sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:5px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#hero-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:11px}
.hero-chip{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:rgba(255,255,255,.75)}
.hero-chip svg{width:12px;height:12px;flex-shrink:0}

/* Section */
.sec-head{display:flex;align-items:center;gap:9px;padding:18px 14px 10px}
.sec-ic{width:30px;height:30px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sec-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.sec-cnt{font-size:11px;font-weight:600;color:var(--ink4);background:var(--bg2);padding:2px 8px;border-radius:20px;margin-right:auto}

/* Product grid */
.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px}

/* Product card */
.p-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;display:block;text-align:right;width:100%;transition:transform .15s,box-shadow .15s;animation:fu .35s ease both}
.p-card:active{transform:scale(.95);box-shadow:none}
.p-card-img{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--bg2)}
.p-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.p-card:active .p-card-img img{transform:scale(1.06)}
.p-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px}
.unavail-mask{position:absolute;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center}
.unavail-tag{background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px}
.p-badge-wrap{position:absolute;top:7px;right:7px}
.p-card-body{padding:9px 10px 11px}
.p-card-name{font-size:13px;font-weight:700;color:var(--ink);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.p-card-desc{font-size:11px;color:var(--ink3);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}

/* Price */
.p-price{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px}
.p-price-main{font-size:14px;font-weight:800;color:var(--acc)}
.p-price-cur{font-size:10px;font-weight:500;opacity:.75;margin-right:1px}
.p-price-old{font-size:10.5px;color:var(--ink4);text-decoration:line-through}
.p-price-save{font-size:9.5px;font-weight:800;color:var(--green);background:var(--green-s);padding:1px 6px;border-radius:20px}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.badge-popular{background:#F9731620;color:#EA6800}
.badge-new{background:var(--green-s);color:var(--green)}
.badge-offer{background:var(--acc-s);color:var(--acc)}

/* Search list */
.s-list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.s-card{display:flex;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:transform .15s;animation:fu .25s ease both}
.s-card:active{transform:scale(.97)}
.s-img{width:82px;flex-shrink:0;background:var(--bg2);position:relative;overflow:hidden}
.s-img img{width:100%;height:100%;object-fit:cover}
.s-img .p-no-img{width:100%;height:100%;font-size:26px}
.s-body{flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.s-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:2px}
.s-name{font-size:13.5px;font-weight:700;color:var(--ink);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.s-desc{font-size:11.5px;color:var(--ink3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:56px 24px;text-align:center}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.5}

/* Results label */
#results-lbl{padding:12px 14px 4px;font-size:12.5px;color:var(--ink3);display:none}
#results-lbl strong{color:var(--ink)}

/* Bottom Sheet */
#sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.58);display:none;align-items:flex-end}
#sheet-bg.open{display:flex;animation:fi .2s ease}
#sheet{width:100%;max-height:92dvh;overflow-y:auto;background:var(--bg);border-radius:24px 24px 0 0;animation:su .4s cubic-bezier(.16,1,.3,1);padding-bottom:env(safe-area-inset-bottom)}
#sheet-img{position:relative;aspect-ratio:16/9;background:var(--bg2);overflow:hidden}
#sheet-img img{width:100%;height:100%;object-fit:cover}
#sheet-img .p-no-img{width:100%;height:100%;font-size:72px}
#sheet-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%)}
#sheet-x{position:absolute;top:13px;left:13px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;display:flex;align-items:center;justify-content:center}
#sheet-x svg{width:17px;height:17px}
#sheet-badge{position:absolute;bottom:11px;right:13px}
#sheet-body{padding:18px 18px 36px}
#sheet-name{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:7px}
#sheet-desc{font-size:13.5px;color:var(--ink2);line-height:1.65;margin-bottom:16px}
.sheet-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--border)}
.sheet-lbl{font-size:13px;color:var(--ink3)}
#sheet-price{display:flex;align-items:baseline;gap:7px}
#sheet-price-main{font-size:24px;font-weight:900;color:var(--acc);letter-spacing:-.02em}
#sheet-price-cur{font-size:13px;color:var(--ink3)}
#sheet-price-old{font-size:13px;color:var(--ink4);text-decoration:line-through}
#sheet-status{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:5px 13px;border-radius:20px}
#sheet-status.avail{background:var(--green-s);color:var(--green)}
#sheet-status.na{background:var(--red-s);color:var(--red)}
#sheet-status svg{width:13px;height:13px}
#sheet-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:52px;border-radius:15px;margin-top:16px;background:#25D366;color:#fff;font-size:15px;font-weight:800;box-shadow:0 6px 24px rgba(37,211,102,.35);transition:opacity .15s,transform .1s}
#sheet-wa:active{opacity:.85;transform:scale(.98)}
#sheet-wa svg{width:22px;height:22px}

/* WhatsApp FAB */
#wa-fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:14px;z-index:150;display:none;align-items:center;gap:8px;padding:12px 18px;border-radius:50px;background:#25D366;color:#fff;font-size:13px;font-weight:800;box-shadow:0 6px 28px rgba(37,211,102,.42);transition:transform .15s}
#wa-fab.show{display:flex}
#wa-fab:active{transform:scale(.95)}
#wa-fab svg{width:20px;height:20px}
#bottom-pad{height:110px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--bg);font-family:var(--font);font-size:13px;font-weight:700;padding:10px 22px;border-radius:40px;box-shadow:var(--shadow-l);transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .3s;opacity:0;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<!-- Promo -->
<div id="promo" style="display:none"><div class="track"><span id="pt1"></span><span id="pt2"></span></div></div>

<!-- Topbar -->
<header id="topbar">
  <div id="tb-logo"></div>
  <div id="tb-name"></div>
  <button class="tb-btn" id="btn-search" aria-label="بحث">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </button>
  <button class="tb-btn" id="btn-theme" aria-label="المظهر">
    <svg id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

  </button>
</header>

<!-- Search -->
<div id="search-wrap">
  <div id="search-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-inp" type="search" placeholder="ابحث في القائمة…" autocomplete="off"/>
    <button id="search-x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
</div>

<!-- Categories -->
<nav id="cats"></nav>

<!-- Main -->
<main>
  <section id="hero">
    <div id="hero-bg"></div><div id="hero-veil"></div>
    <div id="hero-body">
      <div id="hero-eyebrow">قائمة طعامنا</div>
      <div id="hero-title"></div>
      <div id="hero-sub" style="display:none"></div>
      <div id="hero-meta"></div>
    </div>
  </section>
  <div id="results-lbl"></div>
  <div id="content"></div>
  <div id="bottom-pad"></div>
</main>

<!-- WhatsApp FAB -->
<a id="wa-fab" href="#" target="_blank" rel="noreferrer">

<!-- Product Sheet -->

  <div id="sheet">

      <div id="sheet-img-inner"></div>
      <div id="sheet-veil"></div>

        اطلب عبر واتساب
      </a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';

const $  = id => document.getElementById(id);
const E  = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ST = DATA.store;
const CUR = ST.currency || 'دج';
let activeCat = 'all', searchOpen = false;

// ── Accent color ─────────────────────────
document.documentElement.style.setProperty('--acc', ST.accentColor||'#FF5C35');

// ── Theme ────────────────────────────────
let theme = localStorage.getItem('dg-theme') || 'light';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  $('meta-theme').content = t==='dark' ? '#0E0E0E' : '#FAFAF8';
  $('i-moon').style.display = t==='dark'  ? 'none'  : 'block';
  $('i-sun').style.display  = t==='light' ? 'none'  : 'block';
}
applyTheme(theme);
$('btn-theme').addEventListener('click', () => {
  theme = theme==='light' ? 'dark' : 'light';
  applyTheme(theme); localStorage.setItem('dg-theme', theme);
});

// ── Build page ───────────────────────────
document.title = ST.name + ' — القائمة';

// Logo
const logo = $('tb-logo');
logo.style.background = ST.accentColor || '#FF5C35';
if (ST.logo) logo.innerHTML = `<img src="${E(ST.logo)}" alt=""/>`;
else logo.textContent = (ST.name||'D').charAt(0);
$('tb-name').textContent = ST.name || '';

// Hero
const heroBg = $('hero-bg');
if (ST.cover) {
  heroBg.style.backgroundImage = `url(${E(ST.cover)})`;
  $('hero-veil').style.background = 'linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.15) 100%)';
} else {
  heroBg.style.background = `linear-gradient(135deg,${ST.heroFrom||'#1C1C2E'} 0%,${ST.heroTo||'#2D1B4E'} 100%)`;
  heroBg.innerHTML = `<div style="position:absolute;top:-24px;left:-16px;width:120px;height:120px;border-radius:50%;background:${ST.accentColor};opacity:.12"></div><div style="position:absolute;bottom:-16px;right:16px;width:80px;height:80px;border-radius:50%;background:${ST.accentColor};opacity:.09"></div>`;
  $('hero-veil').style.background = 'linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 65%)';
}
$('hero-title').textContent = ST.name || '';
if (ST.description) { $('hero-sub').textContent = ST.description; $('hero-sub').style.display = 'block'; }
const meta = $('hero-meta');
if (ST.phone)   meta.innerHTML += `<a href="tel:${E(ST.phone)}" class="hero-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.18 6.18l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${E(ST.phone)}</a>`;
if (ST.address) meta.innerHTML += `<span class="hero-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${E(ST.address)}</span>`;

// Promo
if (ST.promo?.active && ST.promo.text) {
  const bar = $('promo'); bar.style.display = 'block';
  $('pt1').textContent = ST.promo.text; $('pt2').textContent = ST.promo.text;
}

// WhatsApp FAB
if (ST.whatsapp) { $('wa-fab').href = `https://wa.me/${ST.whatsapp}`; $('wa-fab').classList.add('show'); }

// ── Helpers ──────────────────────────────
function badgeHtml(b) {
  const M = { popular:['🔥','الأكثر طلباً','badge-popular'], new:['✨','جديد','badge-new'], offer:['🏷️','عرض','badge-offer'] };
  const d = b && M[b]; return d ? `<span class="badge ${d[2]}">${d[0]} ${d[1]}</span>` : '';
}
function priceHtml(price, old) {
  const save = old ? Math.round((1-price/old)*100) : 0;
  return `<div class="p-price"><span class="p-price-main">${price.toLocaleString('ar-DZ')}<span class="p-price-cur"> ${CUR}</span></span>${old?`<span class="p-price-old">${old.toLocaleString()}</span>`:''}${save>0?`<span class="p-price-save">-${save}٪</span>`:''}</div>`;
}
function imgHtml(src) { return src ? `<img src="${E(src)}" loading="lazy" decoding="async"/>` : `<div class="p-no-img">🍽️</div>`; }

// ── Category bar ─────────────────────────
const catsEl = $('cats');
function buildCats() {
  catsEl.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'cat-pill on'; all.dataset.id = 'all'; all.textContent = 'الكل';
  all.addEventListener('click', () => selectCat('all')); catsEl.appendChild(all);
  DATA.categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill'; btn.dataset.id = c.id;
    btn.innerHTML = (c.icon ? `<span>${c.icon}</span>` : '') + `<span>${E(c.name)}</span>`;
    btn.addEventListener('click', () => selectCat(c.id));
    catsEl.appendChild(btn);
  });
}
function selectCat(id) {
  activeCat = id;
  catsEl.querySelectorAll('.cat-pill').forEach(b => {
    const on = b.dataset.id === id;
    b.classList.toggle('on',  on && id==='all');
    b.classList.toggle('acc', on && id!=='all');
  });
  catsEl.querySelector(`[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  closeSearch(); render('');
  if (id !== 'all') setTimeout(() => {
    const sec = document.getElementById('sec-'+id);
    if (sec) window.scrollTo({top: sec.getBoundingClientRect().top + scrollY - 128, behavior:'smooth'});
  }, 60);
  else window.scrollTo({top:0,behavior:'smooth'});
}

// ── Render ───────────────────────────────
function render(query) {
  const q = query.trim().toLowerCase();
  $('hero').style.display = q ? 'none' : '';
  $('results-lbl').style.display = q ? 'block' : 'none';
  const content = $('content'); content.innerHTML = '';

  const visible = DATA.products.filter(p => {
    if (p.hidden) return false;
    const inCat = activeCat==='all' || p.cat===activeCat;
    const inQ   = !q || (p.name||'').toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q);
    return inCat && inQ;
  });

  if (q) {
    $('results-lbl').innerHTML = `<strong>${visible.length}</strong> نتيجة لـ «${E(query)}»`;
    if (!visible.length) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد نتائج</div><div class="empty-sub">جرّب كلمة أخرى أو تصفّح الأقسام</div></div>`;
      return;
    }
    const list = document.createElement('div'); list.className = 's-list';
    visible.forEach((p, i) => {
      const c = document.createElement('button'); c.className = 's-card'; c.style.animationDelay = (i*.04)+'s';
      c.innerHTML = `<div class="s-img">${imgHtml(p.img)}${!p.available?`<div class="unavail-mask"><span class="unavail-tag">غير متوفر</span></div>`:''}</div><div class="s-body"><div class="s-top"><div class="s-name">${E(p.name)}</div>${badgeHtml(p.badge)}</div>${p.desc?`<div class="s-desc">${E(p.desc)}</div>`:''}${priceHtml(p.price,p.oldPrice)}</div>`;
      c.addEventListener('click', () => openSheet(p)); list.appendChild(c);
    });
    content.appendChild(list); return;
  }

  // Grid by category
  const groups = DATA.categories
    .map(c => ({ c, items: visible.filter(p => p.cat===c.id) }))
    .filter(g => activeCat==='all' ? g.items.length > 0 : g.c.id===activeCat);

  if (!groups.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا توجد منتجات</div><div class="empty-sub">لم يتم إضافة منتجات لهذا القسم بعد</div></div>`;
    return;
  }
  groups.forEach(({ c, items }) => {
    const sec = document.createElement('section'); sec.id = 'sec-'+c.id;
    sec.innerHTML = `<div class="sec-head"><div class="sec-ic">${c.icon||'📁'}</div><div class="sec-name">${E(c.name)}</div><div class="sec-cnt">${items.length}</div></div>`;
    const grid = document.createElement('div'); grid.className = 'p-grid';
    items.forEach((p, i) => {
      const card = document.createElement('button'); card.className = 'p-card'; card.style.animationDelay = (i*.05)+'s';
      card.innerHTML = `<div class="p-card-img">${imgHtml(p.img)}${!p.available?`<div class="unavail-mask"><span class="unavail-tag">غير متوفر</span></div>`:''}${p.badge?`<div class="p-badge-wrap">${badgeHtml(p.badge)}</div>`:''}</div><div class="p-card-body"><div class="p-card-name">${E(p.name)}</div>${p.desc?`<div class="p-card-desc">${E(p.desc)}</div>`:''}${priceHtml(p.price,p.oldPrice)}</div>`;
      card.addEventListener('click', () => openSheet(p)); grid.appendChild(card);
    });
    sec.appendChild(grid); content.appendChild(sec);
  });
}

// ── Product sheet ────────────────────────
function openSheet(p) {
  $('sheet-img-inner').innerHTML = imgHtml(p.img);
  $('sheet-badge').innerHTML = badgeHtml(p.badge);
  $('sheet-name').textContent = p.name || '';
  $('sheet-desc').textContent = p.desc || '';
  $('sheet-desc').style.display = p.desc ? 'block' : 'none';
  $('sheet-price-main').textContent = (p.price||0).toLocaleString('ar-DZ');
  $('sheet-price-cur').textContent = ' ' + CUR;
  const old = $('sheet-price-old');
  if (p.oldPrice) { old.textContent = p.oldPrice.toLocaleString()+' '+CUR; old.style.display='inline'; }
  else old.style.display='none';
  const st = $('sheet-status');
  if (p.available) { st.className='avail'; st.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg> متوفر'; }
  else             { st.className='na';    st.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg> غير متوفر'; }
  const wa = $('sheet-wa');
  if (ST.whatsapp && p.available) { wa.href=`https://wa.me/${ST.whatsapp}?text=${encodeURIComponent('أريد طلب: '+p.name)}`; wa.style.display='flex'; }
  else wa.style.display='none';
  $('sheet-bg').classList.add('open'); document.body.style.overflow='hidden';
}
function closeSheet() { $('sheet-bg').classList.remove('open'); document.body.style.overflow=''; }
$('sheet-x').addEventListener('click', closeSheet);
$('sheet-bg').addEventListener('click', e => { if(e.target===$('sheet-bg')) closeSheet(); });

// ── Search ───────────────────────────────
function closeSearch() {
  searchOpen = false; $('search-wrap').classList.remove('show');
  $('btn-search').classList.remove('on'); $('search-inp').value=''; $('search-x').style.display='none';
  $('cats').style.top = '54px'; render('');
}
$('btn-search').addEventListener('click', () => {
  searchOpen = !searchOpen;
  $('search-wrap').classList.toggle('show', searchOpen);
  $('btn-search').classList.toggle('on', searchOpen);
  $('cats').style.top = searchOpen ? '96px' : '54px';
  if (searchOpen) setTimeout(() => $('search-inp').focus(), 60); else closeSearch();
});
$('search-inp').addEventListener('input', () => {
  const v = $('search-inp').value;
  $('search-x').style.display = v ? 'block' : 'none'; render(v);
});
$('search-x').addEventListener('click', () => { $('search-inp').value=''; $('search-x').style.display='none'; $('search-inp').focus(); render(''); });

// ── Init ─────────────────────────────────
buildCats(); render('');

})();
</script>
</body>
</html>
