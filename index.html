<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#FAFAF8" id="meta-theme"/>
<title id="doc-title">القائمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="data.js"></script>
<style>
/* ════════════════════════════════════════
   TOKENS
════════════════════════════════════════ */
:root{
  --bg:       #FAFAF8;
  --bg2:      #F3F2ED;
  --bg3:      #E9E8E1;
  --ink:      #111111;
  --ink2:     #444444;
  --ink3:     #888888;
  --ink4:     #BBBBBB;
  --card:     #FFFFFF;
  --border:   #EBEBEB;
  --acc:      #FF5C35;
  --acc-soft: #FF5C3515;
  --green:    #16A34A;
  --green-s:  #16A34A15;
  --red:      #DC2626;
  --red-s:    #DC262615;
  --gold:     #D97706;
  --shadow:   0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.06);
  --shadow-l: 0 8px 32px rgba(0,0,0,.12);
  --r:        14px;
  --r-l:      20px;
  --font:     'Cairo',system-ui,sans-serif;
}
[data-theme=dark]{
  --bg:       #0E0E0E;
  --bg2:      #181818;
  --bg3:      #242424;
  --ink:      #F0EFE9;
  --ink2:     #BBBBBB;
  --ink3:     #777777;
  --ink4:     #444444;
  --card:     #1C1C1C;
  --border:   #2A2A2A;
  --shadow:   0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.25);
  --shadow-l: 0 8px 32px rgba(0,0,0,.5);
}

/* ════════════════════════════════════════
   RESET
════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);color:var(--ink);
  min-height:100dvh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
}
img{display:block;width:100%;height:100%;object-fit:cover}
a{text-decoration:none;color:inherit}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input{font-family:var(--font)}
::-webkit-scrollbar{display:none}

/* ════════════════════════════════════════
   KEYFRAMES
════════════════════════════════════════ */
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ════════════════════════════════════════
   PROMO TICKER
════════════════════════════════════════ */
#promo{
  overflow:hidden;white-space:nowrap;
  font-size:12px;font-weight:700;
  padding:9px 0;color:#fff;
  background:var(--acc);
}
#promo .track{display:inline-block;animation:ticker 20s linear infinite}
#promo .track span{padding:0 56px}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
#topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:8px;
  padding:0 14px;height:54px;
  background:rgba(250,250,248,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:background .2s;
}
[data-theme=dark] #topbar{background:rgba(14,14,14,.85)}
#topbar-logo{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;
  background:var(--acc);flex-shrink:0;overflow:hidden;
}
#topbar-logo img{width:100%;height:100%;border-radius:10px}
#topbar-name{
  flex:1;font-size:15px;font-weight:800;
  letter-spacing:-.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--bg2);color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s,transform .1s;
}
.tb-btn:active{transform:scale(.92)}
.tb-btn svg{width:17px;height:17px}
.tb-btn.active{background:var(--acc);color:#fff}

/* ════════════════════════════════════════
   SEARCH
════════════════════════════════════════ */
#search-bar{
  padding:0 14px 11px;
  background:rgba(250,250,248,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:54px;z-index:99;
  display:none;
  animation:fu .2s ease;
}
[data-theme=dark] #search-bar{background:rgba(14,14,14,.85)}
#search-bar.show{display:block}
#search-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:40px;
  transition:border-color .15s;
}
#search-inner:focus-within{border-color:var(--acc)}
#search-inner svg{width:16px;height:16px;color:var(--ink4);flex-shrink:0}
#search-inp{
  flex:1;background:none;border:none;outline:none;
  font-size:14px;font-weight:500;color:var(--ink);
  font-family:var(--font);
}
#search-inp::placeholder{color:var(--ink4)}
#search-clear{
  color:var(--ink4);padding:4px;border-radius:6px;
  display:none;transition:background .15s;
}
#search-clear:active{background:var(--bg3)}

/* ════════════════════════════════════════
   CATEGORY NAV
════════════════════════════════════════ */
#cats{
  position:sticky;z-index:98;
  display:flex;gap:7px;
  padding:9px 14px;
  overflow-x:auto;
  background:rgba(250,250,248,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:top .15s;
}
[data-theme=dark] #cats{background:rgba(14,14,14,.85)}
.cat-pill{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:0 14px;height:34px;border-radius:9px;
  font-size:13px;font-weight:700;
  background:var(--bg2);color:var(--ink3);
  transition:background .15s,color .15s,transform .1s;
  white-space:nowrap;
}
.cat-pill:active{transform:scale(.94)}
.cat-pill.on{background:var(--ink);color:var(--bg)}
.cat-pill.acc{background:var(--acc)!important;color:#fff!important}

/* ════════════════════════════════════════
   HERO
════════════════════════════════════════ */
#hero{
  margin:12px 14px 4px;
  border-radius:var(--r-l);overflow:hidden;
  position:relative;aspect-ratio:16/7;
  flex-shrink:0;
}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
#hero-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%)}
#hero-body{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:16px 18px;
}
#hero-eyebrow{
  font-size:9px;font-weight:800;color:rgba(255,255,255,.6);
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;
}
#hero-title{
  font-size:21px;font-weight:900;color:#fff;
  line-height:1.15;letter-spacing:-.02em;
}
#hero-sub{
  font-size:12px;color:rgba(255,255,255,.72);
  margin-top:5px;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
#hero-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:11px}
.hero-chip{
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;color:rgba(255,255,255,.75);
}
.hero-chip svg{width:12px;height:12px;flex-shrink:0}

/* ════════════════════════════════════════
   SECTION HEADER
════════════════════════════════════════ */
.sec-head{
  display:flex;align-items:center;gap:9px;
  padding:18px 14px 10px;
}
.sec-ic{
  width:30px;height:30px;border-radius:8px;
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.sec-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.sec-cnt{
  font-size:11px;font-weight:600;color:var(--ink4);
  background:var(--bg2);padding:2px 8px;border-radius:20px;
  margin-right:auto;
}

/* ════════════════════════════════════════
   PRODUCT GRID
════════════════════════════════════════ */
.p-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:9px;padding:0 14px;
}

/* ════════════════════════════════════════
   PRODUCT CARD
════════════════════════════════════════ */
.p-card{
  background:var(--card);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow);
  border:1px solid var(--border);
  cursor:pointer;display:block;text-align:right;width:100%;
  transition:transform .15s,box-shadow .15s;
  animation:fu .35s ease both;
}
.p-card:active{transform:scale(.95);box-shadow:none}
.p-card-img{
  position:relative;aspect-ratio:4/3;overflow:hidden;
  background:var(--bg2);
}
.p-card-img img{transition:transform .35s ease}
.p-card:active .p-card-img img{transform:scale(1.06)}
.p-card-img .no-img{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:36px;background:var(--bg2);
}
.unavail-mask{
  position:absolute;inset:0;background:rgba(0,0,0,.42);
  display:flex;align-items:center;justify-content:center;
}
.unavail-tag{
  background:rgba(0,0,0,.7);color:#fff;
  font-size:10px;font-weight:800;
  padding:4px 12px;border-radius:20px;
}
.p-card-badge{position:absolute;top:7px;right:7px}
.p-card-body{padding:9px 10px 11px}
.p-card-name{
  font-size:13px;font-weight:700;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:3px;
}
.p-card-desc{
  font-size:11px;color:var(--ink3);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:6px;
}
.p-price{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px}
.p-price-main{font-size:14px;font-weight:800;color:var(--acc)}
.p-price-cur{font-size:10px;font-weight:500;opacity:.75;margin-right:1px}
.p-price-old{font-size:10.5px;color:var(--ink4);text-decoration:line-through}
.p-price-save{
  font-size:9.5px;font-weight:800;color:var(--green);
  background:var(--green-s);padding:1px 6px;border-radius:20px;
}

/* ════════════════════════════════════════
   SEARCH LIST VIEW
════════════════════════════════════════ */
.s-list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.s-card{
  display:flex;gap:0;background:var(--card);
  border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shadow);border:1px solid var(--border);
  cursor:pointer;transition:transform .15s;
  animation:fu .25s ease both;
}
.s-card:active{transform:scale(.97)}
.s-card-img{
  width:82px;flex-shrink:0;background:var(--bg2);
  position:relative;overflow:hidden;
}
.s-card-img img{height:100%}
.s-card-img .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px}
.s-card-body{flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.s-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:2px}
.s-card-name{font-size:13.5px;font-weight:700;color:var(--ink);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.s-card-desc{font-size:11.5px;color:var(--ink3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}

/* ════════════════════════════════════════
   BADGES
════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9.5px;font-weight:800;
  padding:3px 8px;border-radius:20px;
  letter-spacing:.02em;white-space:nowrap;
}
.badge-popular{background:#F9731620;color:#EA6800}
.badge-new    {background:#16A34A18;color:#16A34A}
.badge-offer  {background:var(--acc-soft);color:var(--acc)}

/* ════════════════════════════════════════
   EMPTY
════════════════════════════════════════ */
.empty{
  display:flex;flex-direction:column;align-items:center;
  padding:56px 24px;text-align:center;
}
.empty-icon{font-size:44px;margin-bottom:12px;line-height:1}
.empty-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.5}

/* ════════════════════════════════════════
   RESULTS LABEL
════════════════════════════════════════ */
#results-label{
  padding:12px 14px 4px;
  font-size:12.5px;color:var(--ink3);display:none;
}
#results-label strong{color:var(--ink)}

/* ════════════════════════════════════════
   BOTTOM SHEET
════════════════════════════════════════ */
#sheet-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;
  animation:fi .2s ease;
}
#sheet-bg.open{display:flex}
#sheet{
  width:100%;max-height:92dvh;overflow-y:auto;
  background:var(--bg);
  border-radius:24px 24px 0 0;
  animation:su .4s cubic-bezier(.16,1,.3,1);
  padding-bottom:env(safe-area-inset-bottom);
}
#sheet-hero{
  position:relative;aspect-ratio:16/9;
  background:var(--bg2);overflow:hidden;flex-shrink:0;
}
#sheet-hero img{width:100%;height:100%}
#sheet-hero .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;background:var(--bg2)}
#sheet-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%)}
#sheet-close{
  position:absolute;top:13px;left:13px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);color:#fff;
  display:flex;align-items:center;justify-content:center;
}
#sheet-close:active{opacity:.7}
#sheet-close svg{width:17px;height:17px}
#sheet-badge-slot{position:absolute;bottom:11px;right:13px}
#sheet-body{padding:18px 18px 36px}
#sheet-name{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:7px}
#sheet-desc{font-size:13.5px;color:var(--ink2);line-height:1.65;margin-bottom:16px}
.sheet-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-top:1px solid var(--border);
}
.sheet-row-label{font-size:13px;color:var(--ink3)}
#sheet-price{display:flex;align-items:baseline;gap:7px}
#sheet-price-main{font-size:24px;font-weight:900;color:var(--acc);letter-spacing:-.02em}
#sheet-price-cur{font-size:13px;color:var(--ink3)}
#sheet-price-old{font-size:13px;color:var(--ink4);text-decoration:line-through}
#sheet-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12.5px;font-weight:700;
  padding:5px 13px;border-radius:20px;
}
#sheet-status.avail{background:var(--green-s);color:var(--green)}
#sheet-status.na   {background:var(--red-s);  color:var(--red)}
#sheet-status svg{width:13px;height:13px}
#sheet-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;height:52px;border-radius:15px;margin-top:16px;
  background:#25D366;color:#fff;
  font-size:15px;font-weight:800;letter-spacing:.01em;
  box-shadow:0 6px 24px rgba(37,211,102,.35);
  transition:opacity .15s,transform .1s;
}
#sheet-wa:active{opacity:.85;transform:scale(.98)}
#sheet-wa svg{width:22px;height:22px}
#sheet-wa.hidden{display:none}

/* ════════════════════════════════════════
   WhatsApp FAB
════════════════════════════════════════ */
#wa-fab{
  position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:14px;
  z-index:150;display:none;
  align-items:center;gap:8px;
  padding:12px 18px;border-radius:50px;
  background:#25D366;color:#fff;
  font-size:13px;font-weight:800;
  box-shadow:0 6px 28px rgba(37,211,102,.42);
  transition:transform .15s;
}
#wa-fab.show{display:flex}
#wa-fab:active{transform:scale(.95)}
#wa-fab svg{width:20px;height:20px}

#bottom-pad{height:110px}
</style>
</head>
<body>

<!-- PROMO -->
<div id="promo" style="display:none">
  <div class="track"><span id="pt1"></span><span id="pt2"></span></div>
</div>

<!-- TOPBAR -->
<header id="topbar">
  <div id="topbar-logo"></div>
  <div id="topbar-name"></div>
  <button class="tb-btn" id="btn-search" aria-label="بحث">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </button>
  <button class="tb-btn" id="btn-theme" aria-label="تغيير المظهر">
    <svg id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="i-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
</header>

<!-- SEARCH -->
<div id="search-bar">
  <div id="search-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-inp" type="search" placeholder="ابحث في القائمة…" autocomplete="off"/>
    <button id="search-clear" aria-label="مسح">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</div>

<!-- CATEGORIES -->
<nav id="cats"></nav>

<!-- MAIN -->
<main id="main">
  <!-- Hero -->
  <section id="hero">
    <div id="hero-bg"></div>
    <div id="hero-veil"></div>
    <div id="hero-body">
      <div id="hero-eyebrow">قائمة طعامنا</div>
      <div id="hero-title"></div>
      <div id="hero-sub" style="display:none"></div>
      <div id="hero-meta"></div>
    </div>
  </section>

  <!-- Results label (search) -->
  <div id="results-label"></div>

  <!-- Product content -->
  <div id="content"></div>
</main>

<!-- FAB -->
<a id="wa-fab" href="#" target="_blank" rel="noreferrer">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
  تواصل معنا
</a>

<div id="bottom-pad"></div>

<!-- SHEET -->
<div id="sheet-bg">
  <div id="sheet">
    <div id="sheet-hero">
      <div id="sheet-img-wrap"></div>
      <div id="sheet-veil"></div>
      <button id="sheet-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div id="sheet-badge-slot"></div>
    </div>
    <div id="sheet-body">
      <div id="sheet-name"></div>
      <div id="sheet-desc"></div>
      <div class="sheet-row">
        <span class="sheet-row-label">السعر</span>
        <div id="sheet-price">
          <span id="sheet-price-main"></span>
          <span id="sheet-price-cur">دج</span>
          <span id="sheet-price-old" style="display:none"></span>
        </div>
      </div>
      <div class="sheet-row">
        <span class="sheet-row-label">الحالة</span>
        <div id="sheet-status"></div>
      </div>
      <a id="sheet-wa" href="#" target="_blank" rel="noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:22px;height:22px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
        اطلب عبر واتساب
      </a>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── Merge admin state ─────────────────── */
try{const s=JSON.parse(localStorage.getItem('dg-v3')||'null');if(s){Object.assign(STORE,{name:s.name||STORE.name,description:s.description||STORE.description,tagline:s.tagline||STORE.tagline,logo:s.logo||STORE.logo,phone:s.phone||STORE.phone,whatsapp:s.whatsapp||STORE.whatsapp,address:s.address||STORE.address,instagram:s.instagram||STORE.instagram,facebook:s.facebook||STORE.facebook,accentColor:s.accentColor||STORE.accentColor,heroFrom:s.heroFrom||STORE.heroFrom,heroTo:s.heroTo||STORE.heroTo,promo:s.promo||STORE.promo,categories:s.categories?.length?s.categories:STORE.categories,products:s.products?.length?s.products:STORE.products})}}catch(e){}

/* ── Accent ────────────────────────────── */
const R=document.documentElement;
R.style.setProperty('--acc', STORE.accentColor||'#FF5C35');

/* ── Theme ─────────────────────────────── */
let theme=localStorage.getItem('dg-theme')||'light';
function applyTheme(t){
  R.setAttribute('data-theme',t);
  document.getElementById('meta-theme').content=t==='dark'?'#0E0E0E':'#FAFAF8';
  document.getElementById('i-moon').style.display=t==='dark'?'none':'block';
  document.getElementById('i-sun').style.display=t==='dark'?'block':'none';
}
applyTheme(theme);
document.getElementById('btn-theme').addEventListener('click',()=>{
  theme=theme==='light'?'dark':'light';
  applyTheme(theme);
  localStorage.setItem('dg-theme',theme);
});

/* ── Promo ─────────────────────────────── */
if(STORE.promo?.active&&STORE.promo.text){
  const el=document.getElementById('promo');
  el.style.display='block';
  el.style.background=STORE.accentColor||'#FF5C35';
  const t=STORE.promo.text;
  document.getElementById('pt1').textContent=t;
  document.getElementById('pt2').textContent=t;
}

/* ── Topbar ────────────────────────────── */
const logoEl=document.getElementById('topbar-logo');
logoEl.style.background=STORE.accentColor||'#FF5C35';
if(STORE.logo){logoEl.innerHTML=`<img src="${esc(STORE.logo)}" alt=""/>`}
else{logoEl.textContent=STORE.name.charAt(0)}
document.getElementById('topbar-name').textContent=STORE.name;
document.title=STORE.name+' — القائمة';

/* ── Hero ──────────────────────────────── */
const heroBg=document.getElementById('hero-bg');
if(STORE.cover){
  heroBg.style.backgroundImage=`url(${esc(STORE.cover)})`;
  document.getElementById('hero-veil').style.background='linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.15) 100%)';
}else{
  heroBg.style.background=`linear-gradient(135deg,${STORE.heroFrom||'#1C1C2E'} 0%,${STORE.heroTo||'#2D1B4E'} 100%)`;
  heroBg.innerHTML=`<div style="position:absolute;top:-24px;left:-16px;width:120px;height:120px;border-radius:50%;background:${STORE.accentColor};opacity:.12"></div><div style="position:absolute;bottom:-16px;right:16px;width:80px;height:80px;border-radius:50%;background:${STORE.accentColor};opacity:.09"></div>`;
}
document.getElementById('hero-title').textContent=STORE.name;
if(STORE.description){
  const s=document.getElementById('hero-sub');
  s.textContent=STORE.description;s.style.display='block';
}
const meta=document.getElementById('hero-meta');
if(STORE.phone) meta.innerHTML+=`<a href="tel:${esc(STORE.phone)}" class="hero-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.18 6.18l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${esc(STORE.phone)}</a>`;
if(STORE.address) meta.innerHTML+=`<span class="hero-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(STORE.address)}</span>`;

/* ── WhatsApp FAB ──────────────────────── */
if(STORE.whatsapp){
  const fab=document.getElementById('wa-fab');
  fab.href=`https://wa.me/${STORE.whatsapp}`;
  fab.classList.add('show');
}

/* ── Categories ────────────────────────── */
let activeCat='all';
const catsEl=document.getElementById('cats');

function buildCats(){
  catsEl.innerHTML='';
  const all=mkBtn('all','الكل','');
  all.classList.add('on');
  catsEl.appendChild(all);
  STORE.categories.forEach(c=>{
    const btn=mkBtn(c.id,c.name,c.icon||'');
    catsEl.appendChild(btn);
  });
}
function mkBtn(id,name,icon){
  const b=document.createElement('button');
  b.className='cat-pill';b.dataset.id=id;
  b.innerHTML=(icon?`<span>${icon}</span>`:'')+'<span>'+name+'</span>';
  b.addEventListener('click',()=>selectCat(id));
  return b;
}
function selectCat(id){
  activeCat=id;
  catsEl.querySelectorAll('.cat-pill').forEach(b=>{
    const on=b.dataset.id===id;
    b.classList.toggle('on',on&&id==='all');
    b.classList.toggle('acc',on&&id!=='all');
  });
  const target=catsEl.querySelector(`[data-id="${id}"]`);
  target?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  closeSearch();
  render('');
  if(id!=='all'){
    setTimeout(()=>{
      const sec=document.getElementById('s-'+id);
      if(sec){window.scrollTo({top:sec.getBoundingClientRect().top+scrollY-130,behavior:'smooth'})}
    },60);
  }else{window.scrollTo({top:0,behavior:'smooth'})}
}

/* ── Helpers ───────────────────────────── */
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function price(p,op){
  const save=op?Math.round((1-p/op)*100):0;
  return `<div class="p-price">
    <span class="p-price-main">${p.toLocaleString('ar-DZ')}<span class="p-price-cur"> ${STORE.currency}</span></span>
    ${op?`<span class="p-price-old">${op.toLocaleString()}</span>`:''}
    ${save>0?`<span class="p-price-save">-${save}٪</span>`:''}
  </div>`;
}
function badge(b){
  if(!b||b==='soldout')return'';
  const m={popular:['🔥','الأكثر طلباً','badge-popular'],new:['✨','جديد','badge-new'],offer:['🏷️','عرض','badge-offer']};
  const d=m[b];return d?`<span class="badge ${d[2]}">${d[0]} ${d[1]}</span>`:'';
}
function imgOrPlaceholder(src,size=''){
  return src
    ?`<img src="${esc(src)}" loading="lazy" decoding="async"/>`
    :`<div class="no-img">🍽️</div>`;
}
function unavailMask(){
  return`<div class="unavail-mask"><span class="unavail-tag">غير متوفر</span></div>`;
}

/* ── Render ─────────────────────────────── */
function render(query){
  const q=query.trim().toLowerCase();
  const hero=document.getElementById('hero');
  const label=document.getElementById('results-label');
  const content=document.getElementById('content');

  const visible=STORE.products.filter(p=>{
    if(p.hidden)return false;
    const inCat=activeCat==='all'||p.cat===activeCat;
    const inQ=!q||(p.name||'').toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q);
    return inCat&&inQ;
  });

  hero.style.display=q?'none':'';
  label.style.display=q?'block':'none';
  content.innerHTML='';

  if(q){
    label.innerHTML=`<strong>${visible.length}</strong> نتيجة لـ «${esc(query)}»`;
    if(!visible.length){
      content.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد نتائج</div><div class="empty-sub">جرّب كلمة أخرى أو تصفّح الأقسام</div></div>`;
      return;
    }
    const list=document.createElement('div');list.className='s-list';
    visible.forEach((p,i)=>{
      const c=document.createElement('button');
      c.className='s-card';c.style.animationDelay=(i*.04)+'s';
      c.innerHTML=`<div class="s-card-img">${imgOrPlaceholder(p.img)}${!p.available?unavailMask():''}</div>
        <div class="s-card-body">
          <div class="s-card-top"><div class="s-card-name">${esc(p.name)}</div>${badge(p.badge)}</div>
          ${p.desc?`<div class="s-card-desc">${esc(p.desc)}</div>`:''}
          ${price(p.price,p.oldPrice)}
        </div>`;
      c.addEventListener('click',()=>openSheet(p));
      list.appendChild(c);
    });
    content.appendChild(list);
    return;
  }

  // Group view
  const groups=STORE.categories
    .map(cat=>({cat,items:visible.filter(p=>p.cat===cat.id)}))
    .filter(g=>(activeCat==='all'?g.items.length>0:g.cat.id===activeCat));

  if(!groups.length||!visible.length){
    content.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا توجد منتجات</div><div class="empty-sub">لم يتم إضافة منتجات لهذا القسم بعد</div></div>`;
    return;
  }

  groups.forEach(({cat,items})=>{
    const sec=document.createElement('section');
    sec.id='s-'+cat.id;
    sec.innerHTML=`<div class="sec-head">
      <div class="sec-ic">${cat.icon||'📁'}</div>
      <div class="sec-name">${esc(cat.name)}</div>
      <div class="sec-cnt">${items.length}</div>
    </div>`;
    const grid=document.createElement('div');grid.className='p-grid';
    items.forEach((p,i)=>{
      const card=document.createElement('button');
      card.className='p-card';card.style.animationDelay=(i*.05)+'s';
      card.innerHTML=`<div class="p-card-img">
          ${imgOrPlaceholder(p.img)}
          ${!p.available?unavailMask():''}
          ${p.badge?`<div class="p-card-badge">${badge(p.badge)}</div>`:''}
        </div>
        <div class="p-card-body">
          <div class="p-card-name">${esc(p.name)}</div>
          ${p.desc?`<div class="p-card-desc">${esc(p.desc)}</div>`:''}
          ${price(p.price,p.oldPrice)}
        </div>`;
      card.addEventListener('click',()=>openSheet(p));
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    content.appendChild(sec);
  });
}

/* ── Product Sheet ──────────────────────── */
function openSheet(p){
  // Image
  const hw=document.getElementById('sheet-img-wrap');
  hw.innerHTML=p.img?`<img src="${esc(p.img)}" loading="lazy"/>`:`<div class="no-img">🍽️</div>`;
  // Badge
  document.getElementById('sheet-badge-slot').innerHTML=badge(p.badge);
  // Body
  document.getElementById('sheet-name').textContent=p.name;
  document.getElementById('sheet-desc').textContent=p.desc||'';
  document.getElementById('sheet-desc').style.display=p.desc?'block':'none';
  // Price
  document.getElementById('sheet-price-main').textContent=p.price.toLocaleString('ar-DZ');
  const old=document.getElementById('sheet-price-old');
  old.style.display=p.oldPrice?'inline':'none';
  if(p.oldPrice)old.textContent=p.oldPrice.toLocaleString()+' '+STORE.currency;
  // Status
  const st=document.getElementById('sheet-status');
  if(p.available){
    st.className='avail';
    st.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg> متوفر`;
  }else{
    st.className='na';
    st.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg> غير متوفر حالياً`;
  }
  // WhatsApp
  const wa=document.getElementById('sheet-wa');
  if(STORE.whatsapp&&p.available){
    wa.href=`https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent('أريد طلب: '+p.name)}`;
    wa.classList.remove('hidden');wa.style.display='flex';
  }else{wa.style.display='none'}

  document.getElementById('sheet-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('sheet-bg').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('sheet-close').addEventListener('click',closeSheet);
document.getElementById('sheet-bg').addEventListener('click',e=>{if(e.target===document.getElementById('sheet-bg'))closeSheet()});

/* ── Search ─────────────────────────────── */
let searchVisible=false;
const searchBar=document.getElementById('search-bar');
const searchInp=document.getElementById('search-inp');

document.getElementById('btn-search').addEventListener('click',()=>{
  searchVisible=!searchVisible;
  searchBar.classList.toggle('show',searchVisible);
  document.getElementById('btn-search').classList.toggle('active',searchVisible);
  const topNow=parseInt(getComputedStyle(document.getElementById('cats')).top)||54;
  document.getElementById('cats').style.top=searchVisible?'96px':'54px';
  if(searchVisible)setTimeout(()=>searchInp.focus(),80);
  else closeSearch();
});
function closeSearch(){
  searchVisible=false;
  searchBar.classList.remove('show');
  document.getElementById('btn-search').classList.remove('active');
  searchInp.value='';
  document.getElementById('search-clear').style.display='none';
  document.getElementById('cats').style.top='54px';
  render('');
}
searchInp.addEventListener('input',()=>{
  const v=searchInp.value;
  document.getElementById('search-clear').style.display=v?'block':'none';
  render(v);
});
document.getElementById('search-clear').addEventListener('click',()=>{
  searchInp.value='';
  document.getElementById('search-clear').style.display='none';
  searchInp.focus();
  render('');
});

/* ── Init ────────────────────────────────── */
buildCats();
render('');

})();
</script>
</body>
</html>
